<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Канал — Discord‑Clone</title>
    <style>
        body {background:#2f3136;color:#fff;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0;}
        .header {background:#36393f;padding:10px;display:flex;justify-content:space-between;align-items:center;}
        .header a {color:#00b0f4;margin-left:15px;}
        .messages {height:80vh;overflow-y:auto;padding:10px;background:#36393f;border-radius:4px;margin:10px;}
        .input {display:flex;margin:10px;}
        .input input{flex:1;padding:8px;background:#202225;border:none;color:#fff;border-radius:4px;}
        .input button{margin-left:5px;background:#5865f2;border:none;color:#fff;padding:8px;border-radius:4px;cursor:pointer;}
    </style>
</head>
<body>
<div class="header">
    <span>Discord‑Clone</span>
    <span><a href="server.html">Назад к серверу</a></span>
</div>
<div class="messages" id="message-list"></div>
<div class="input">
    <input id="msg-input" placeholder="Введите сообщение...">
    <button onclick="sendMessage()">Отправить</button>
</div>
<script>
const params=new URLSearchParams(window.location.search);
const channelId=params.get('cid');
if(!channelId){alert('Нет ID канала');window.location.href='index.html';}
const token=localStorage.getItem('token');
if(!token){window.location.href='login.html';}
async function loadMessages(){
    const resp=await fetch(`/channels/${channelId}/messages`,{headers:{'Authorization':`Bearer ${token}`}});
    if(!resp.ok){alert('Не удалось загрузить сообщения');return;}
    const msgs=await resp.json();
    const list=document.getElementById('message-list');
    list.innerHTML='';
    msgs.forEach(m=>addMessage(m));
}
function addMessage(msg){
    const div=document.createElement('div');
    div.textContent=`[${msg.author_id}] ${msg.content}`;
    document.getElementById('message-list').appendChild(div);
}
async function sendMessage(){
    const content=document.getElementById('msg-input').value.trim();
    if(!content)return;
    await fetch(`/channels/${channelId}/messages`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body:JSON.stringify({content})
    });
    document.getElementById('msg-input').value='';
    loadMessages();
}
loadMessages();
</script>
</body>
</html>
