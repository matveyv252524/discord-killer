<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Discord‑Clone — Главная</title>
    <style>
        body {background:#2f3136;color:#fff;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0;}
        .header {background:#36393f;padding:10px;display:flex;justify-content:space-between;align-items:center;}
        .header a {color:#00b0f4;margin-left:15px;}
        .servers {padding:20px;}
        .servers h2 {margin-top:0;}
        .servers ul {list-style:none;padding:0;}
        .servers li {margin:5px 0;}
        .servers button {margin-left:10px;background:#5865f2;border:none;color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;}
        .create {margin-top:20px;}
        .create input{width:200px;padding:5px;margin-right:5px;background:#202225;border:none;color:#fff;border-radius:4px;}
        .create button{background:#5865f2;border:none;color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;}
    </style>
</head>
<body>
<div class="header">
    <span>Discord‑Clone</span>
    <span>
        <a href="login.html">Войти</a>
        <a href="register.html">Регистрация</a>
    </span>
</div>
<div class="servers">
    <h2>Мои серверы</h2>
    <ul id="server-list"></ul>
    <div class="create">
        <input id="new-server" placeholder="Новое название сервера">
        <button onclick="createServer()">Создать сервер</button>
    </div>
</div>
<script>
async function loadServers(){
    const token=localStorage.getItem('token');
    if(!token){window.location.href='login.html';return;}
    const resp=await fetch('/servers',{headers:{'Authorization':`Bearer ${token}`} });
    if(!resp.ok){alert('Не удалось загрузить серверы');return;}
    const servers=await resp.json();
    const list=document.getElementById('server-list');
    list.innerHTML='';
    servers.forEach(s=>{
        const li=document.createElement('li');
        const a=document.createElement('a');
        a.href=`server.html?sid=${s.id}`;
        a.textContent=s.name;
        li.appendChild(a);
        list.appendChild(li);
    });
}
async function createServer(){
    const name=document.getElementById('new-server').value.trim();
    if(!name)return alert('Введите название');
    const token=localStorage.getItem('token');
    const resp=await fetch('/servers',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({name})});
    if(!resp.ok){alert('Ошибка создания');return;}
    await loadServers();
    document.getElementById('new-server').value='';
}
loadServers();
</script>
</body>
</html>
