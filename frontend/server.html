<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сервер — Discord‑Clone</title>
    <style>
        body {background:#2f3136;color:#fff;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0;}
        .header {background:#36393f;padding:10px;display:flex;justify-content:space-between;align-items:center;}
        .header a {color:#00b0f4;margin-left:15px;}
        .content {display:flex;}
        .channels {width:200px;background:#2f3136;padding:10px;}
        .channels ul{list-style:none;padding:0;}
        .channels li{margin:5px 0;}
        .chat {flex:1;padding:10px;display:flex;flex-direction:column;}
        .messages {flex:1;overflow-y:auto;background:#36393f;padding:10px;border-radius:4px;}
        .input {margin-top:10px;display:flex;}
        .input input{flex:1;padding:8px;background:#202225;border:none;color:#fff;border-radius:4px;}
        .input button{margin-left:5px;background:#5865f2;border:none;color:#fff;padding:8px;border-radius:4px;cursor:pointer;}
    </style>
</head>
<body>
<div class="header">
    <span>Discord‑Clone</span>
    <span><a href="index.html">Назад к серверам</a></span>
</div>
<div class="content">
    <div class="channels">
        <h3>Каналы</h3>
        <ul id="channel-list"></ul>
        <input id="new-channel" placeholder="Новый канал"><button onclick="createChannel()">+</button>
        <button onclick="openAnalytics()" style="margin-top:10px;">Аналитика</button>
    </div>
    <div class="chat">
        <div class="messages" id="message-list"></div>
        <div class="input">
            <input id="msg-input" placeholder="Введите сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>
<script>
const params=new URLSearchParams(window.location.search);
const serverId=params.get('sid');
if(!serverId){alert('Нет ID сервера');window.location.href='index.html';}
const token=localStorage.getItem('token');
if(!token){window.location.href='login.html';}
let currentChannel=null;
async function loadChannels(){
    const resp=await fetch(`/servers/${serverId}/channels`,{headers:{'Authorization':`Bearer ${token}`}});
    if(!resp.ok){alert('Не удалось загрузить каналы');return;}
    const channels=await resp.json();
    const list=document.getElementById('channel-list');
    list.innerHTML='';
    channels.forEach(c=>{
        const li=document.createElement('li');
        const a=document.createElement('a');
        a.href='#';
        a.textContent=c.name;
        a.onclick=()=>selectChannel(c.id);
        li.appendChild(a);
        list.appendChild(li);
    });
    if(channels.length>0) selectChannel(channels[0].id);
}
async function selectChannel(id){
    currentChannel=id;
    document.getElementById('message-list').innerHTML='';
    loadMessages();
    const ws=new WebSocket(`ws://${location.host}/ws?token=${token}`);
    ws.onopen=()=>ws.send(JSON.stringify({channel_id:id}));
    ws.onmessage=e=>{const data=JSON.parse(e.data);if(data.type==='message'){addMessage(data);}}
    window.ws=ws;
}
async function loadMessages(){
    if(!currentChannel)return;
    const resp=await fetch(`/channels/${currentChannel}/messages`,{headers:{'Authorization':`Bearer ${token}`}});
    if(!resp.ok)return;
    const msgs=await resp.json();
    msgs.forEach(addMessage);
}
function addMessage(msg){
    const div=document.createElement('div');
    div.textContent=`[${msg.author_id}] ${msg.content}`;
    document.getElementById('message-list').appendChild(div);
}
async function sendMessage(){
    const content=document.getElementById('msg-input').value.trim();
    if(!content||!currentChannel)return;
    await fetch(`/channels/${currentChannel}/messages`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({content})});
    document.getElementById('msg-input').value='';
}
async function createChannel(){
    const name=document.getElementById('new-channel').value.trim();
    if(!name)return alert('Введите название');
    const resp=await fetch(`/servers/${serverId}/channels`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({name})});
    if(!resp.ok){alert('Ошибка создания');return;}
    document.getElementById('new-channel').value='';
    loadChannels();
}
function openAnalytics(){
    window.location.href=`analytics.html?sid=${serverId}`;
}
loadChannels();
</script>
</body>
</html>
